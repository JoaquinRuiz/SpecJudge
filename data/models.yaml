# SpecJudge model catalog
# -----------------------
# Community-editable reference source (Principle V / FR-017).
# To add a model or update a price, edit THIS file: no code changes needed.
# Every price MUST carry a `pricing_date` so its freshness is verifiable (FR-018).
# Entries without `pricing_date` are shown but flagged as "freshness not verifiable".
#
# Valid capability levels: low | medium | high | top
# Dimensions must match those in data/rating-rules.yaml.
#
# Prices are per million tokens, in USD, and are a MAINTAINED REFERENCE — not a
# live feed. Verify against the provider's pricing page before relying on them.

version: 1

dimensions:
  - reasoning              # reasoning complexity the project demands
  - size                   # size / structure of the work (context, number of pieces)
  - domain_specialization  # domain specialization required

