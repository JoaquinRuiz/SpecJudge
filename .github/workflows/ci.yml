name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A new push to the same PR cancels the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      # Ollama is mocked at the HTTP level, so the suite needs no local model
      # and makes no network calls.
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check --output-format=github .

      - name: Ruff (format)
        run: uv run ruff format --check .

  catalog:
    name: Catalog schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      # Most contributions only touch data/models.yaml. This job gives those PRs
      # a fast, focused signal: every model conforms to the schema, every price
      # carries a date, and the catalog and rating rules agree on dimensions.
      - name: Validate model catalog
        run: uv run pytest tests/contract -q

  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Catches packaging mistakes (a malformed pyproject.toml builds nothing).
      - name: Build sdist and wheel
        run: uv build

      - name: Check the built package installs and runs
        run: |
          uv tool install --force ./dist/*.whl
          specjudge --version
