name: Release

# Publishes to PyPI when a GitHub Release is published.
#
# Authentication is OIDC (PyPI "Trusted Publisher") — there is no API token in
# this repository. PyPI verifies the request came from this exact workflow, in
# this repository, in the `pypi` environment.
#
# Trusted publisher settings that must match on PyPI:
#   Owner: JoaquinRuiz · Repository: SpecJudge
#   Workflow: release.yml · Environment: pypi
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Don't ship something the suite hasn't seen.
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run --extra dev pytest -q

      - name: Build sdist and wheel
        run: uv build

      - name: Verify the wheel installs and runs
        run: |
          uv tool install --force ./dist/*.whl
          specjudge --version

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/specjudge
    permissions:
      id-token: write # required for OIDC; this is what replaces the API token
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
