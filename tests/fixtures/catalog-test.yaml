      output_per_million: 1.50
      currency: USD
      pricing_date: 2026-07-01

  - id: capable-large
    name: Capable Large
    provider: ExampleAI
    capabilities:
      reasoning: high
      size: high
      domain_specialization: high
    price:
      input_per_million: 3.00
      output_per_million: 15.00
      currency: USD
      pricing_date: 2026-07-01

  - id: frontier-top
    name: Frontier Top
